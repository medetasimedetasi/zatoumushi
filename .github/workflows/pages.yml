name: Deploy game to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static game
        run: |
          mkdir -p "${RUNNER_TEMP}/site"
          cp index.html "${RUNNER_TEMP}/site/"
          cp -R BGM SE "${RUNNER_TEMP}/site/"
          touch "${RUNNER_TEMP}/site/.nojekyll"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
