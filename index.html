<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Harvestman Swarm</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#f7f6f2; }
  body > canvas { transition:filter .75s ease; }
  body.critical-hp > canvas { filter:saturate(.28) brightness(.78) contrast(.93); }
  #ui {
    position:fixed; left:14px; top:12px; font-family:"Yu Gothic UI",sans-serif;
    font-size:13px; color:#8a8a80; pointer-events:none; line-height:1.7;
    text-shadow:0 0 5px #fff, 0 0 5px #fff;
  }
  #stats { color:#5c6b3c; font-weight:bold; font-size:14px; }
  #flash {
    position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none;
    transition:opacity .18s ease;
  }
  #grayout {
    position:fixed; inset:0; background:#8f8f8a; opacity:0; pointer-events:none;
    mix-blend-mode:saturation;
  }
  #graydark {
    position:fixed; inset:0; background:#2a2a28; opacity:0; pointer-events:none;
  }
  #stagelabel {
    position:fixed; left:0; right:0; top:38%; text-align:center; pointer-events:none;
    font-family:"Yu Gothic UI",sans-serif; font-size:44px; font-weight:bold;
    color:#3a3a33; opacity:0; transition:opacity .3s ease; letter-spacing:.15em;
    text-shadow:0 0 18px #fff; z-index:6;
  }
  .edge {
    position:fixed; pointer-events:none;
    font-family:"Yu Gothic UI",sans-serif; font-size:24px; font-weight:bold;
    color:#a89f93; opacity:.4; transition:opacity .25s ease, color .25s ease;
    text-shadow:0 0 8px #fff, 0 0 8px #fff;
  }
  #edgeL { left:10px; top:50%; transform:translateY(-50%); }
  #edgeR { right:10px; top:50%; transform:translateY(-50%); }
  #edgeT { top:6px; left:50%; transform:translateX(-50%); }
  #edgeB { bottom:6px; left:50%; transform:translateX(-50%); }
  .edge.hot { opacity:1; color:#7a6f5f; }
  .edge.off { opacity:0; }
  #minimap {
    position:fixed; left:14px; bottom:14px; display:grid;
    grid-template-columns:repeat(5, 20px); grid-auto-rows:20px; gap:3px;
    padding:6px; background:rgba(255,255,255,.6); border-radius:6px;
    box-shadow:0 1px 6px rgba(0,0,0,.10); pointer-events:none;
  }
  .mm {
    border-radius:3px; background:#f0eee2; border:1px solid #d8d4c4;
    transition:background .3s ease;
  }
  .mm.hq { background:#d96b5f; border-color:#c05a4f; }
  .mm.cleared { background:#c9c6bb; border-color:#b7b3a6; }
  .mm.nest { background:#7fb56a; border-color:#5f9a4c; }
  .mm.reinforce { background:#e8c14a; border-color:#c9a52c; }
  .mm.skill { background:#76cbd0; border-color:#47aeb7; }
  .mm.cur { outline:2px solid #8fa065; outline-offset:1px; }
  #skillui {
    display:none; align-items:center; gap:6px; margin-left:12px; color:#6bbfc5;
    font-size:12px; font-weight:600; letter-spacing:.04em;
  }
  #skillui.show { display:inline-flex; }
  #skillui .dot { width:10px; height:10px; border-radius:50%; background:#68cbd0; box-shadow:0 0 5px #a8edf0; }
  #skillhelp {
    position:fixed; inset:0; z-index:8; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; background:rgba(248,247,242,.28); transition:opacity .35s ease;
    font-family:"Yu Gothic UI",sans-serif; color:#f8f8f4;
  }
  #skillhelp.show { opacity:1; }
  #skillhelp svg { width:min(560px,76vw); height:auto; filter:drop-shadow(0 1px 3px rgba(0,0,0,.14)); }
  #audioui {
    position:fixed; right:14px; top:12px; display:flex; align-items:center; gap:8px;
    pointer-events:auto; font-family:"Yu Gothic UI",sans-serif;
    background:rgba(255,255,255,.6); border-radius:6px; padding:5px 9px;
    box-shadow:0 1px 6px rgba(0,0,0,.10);
  }
  #mutebtn {
    border:none; background:none; cursor:pointer; font-size:16px; line-height:1;
    padding:2px; color:#5c6b3c; width:22px; text-align:center;
  }
  #volslider { width:82px; accent-color:#8fa065; cursor:pointer; }
  #ui, #minimap, .edge, #audioui { transition:opacity .9s ease; }
  body.title #ui, body.title #minimap, body.title .edge, body.title #audioui { opacity:0 !important; }
  body.title #audioui { pointer-events:none !important; }
  #thanks {
    position:fixed; inset:0; background:#0e0e0c; display:none; z-index:10;
    color:#e8e6da; font-family:Consolas,"Courier New",monospace; text-align:center;
  }
  #thanks.show { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; }
  #thanks .big { font-size:32px; font-weight:bold; letter-spacing:.18em; }
  #thanks .big span { display:inline-block; animation:hop .9s steps(2,jump-none) infinite; }
  @keyframes hop { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-9px); } }
  #thanks .res { font-size:15px; line-height:2.1; color:#b9b5a4; letter-spacing:.08em; }
</style>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="ui"><span id="stats"></span><span id="skillui"><i class="dot"></i>Skill — long Push</span></div>
<div id="skillhelp">
  <svg viewBox="0 0 560 270" aria-label="Long Push">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M245 54c0-25 18-41 38-41s38 16 38 41v75c0 20-14 36-32 36h-12c-18 0-32-16-32-36z"/>
      <path d="M283 14v61m-38 0h76"/><circle cx="283" cy="48" r="12"/>
      <path d="M91 189c72-24 130-83 174-131"/><path d="M250 63l15-5-4 15"/>
      <path d="M322 21l6-16m13 20 12-13m-4 28 17-5"/>
    </g>
    <g fill="currentColor" text-anchor="middle">
      <text x="150" y="215" font-size="30" font-family="cursive">long Push</text>
    </g>
  </svg>
</div>
<div id="thanks"></div>
<div id="stagelabel"></div>
<div id="edgeL" class="edge">◀</div>
<div id="edgeR" class="edge">▶</div>
<div id="edgeT" class="edge">▲</div>
<div id="edgeB" class="edge">▼</div>
<div id="minimap"></div>
<div id="audioui">
  <button id="mutebtn" title="Mute (M)">🔊</button>
  <input id="volslider" type="range" min="0" max="100" value="50" title="Volume">
</div>
<div id="graydark"></div>
<div id="grayout"></div>
<div id="flash"></div>
<script type="module">
import * as THREE from 'three';

// ================= stage geometry =================
const STAGE_HALF_W = 20;   // x: -20..20
const STAGE_HALF_D = 12;   // z: -12..12
// ---- 4x4 グリッドワールド。開始(0,0)=ミニマップ左上、敵本拠地(3,3)=右下 ----
// カメラは +z 側から見下ろす: 画面右=+x(col+1)、画面下=+z(row+1)
const GRID = 5;
const HQ_COL = 4, HQ_ROW = 4;
const NEST_COL = 2, NEST_ROW = 2;   // ミニマップど真ん中: 味方の巣(常設スポナー。敵もいる)
const FORT_COL = 4, FORT_ROW = 0;   // 右上: 大きな家のある砦(隘路+定期排出)
const REINF_COL = 4, REINF_ROW = 3;    // 本拠地の一つ上: 増援拠点
const REINF2_COL = 0, REINF2_ROW = 4;  // ミニマップ左下: 2つ目の増援拠点
const REINF3_COL = 3, REINF3_ROW = 4;  // 下段・右から2番目: 3つ目の増援拠点
const BUG_FIELD_COL = 2, BUG_FIELD_ROW = 4; // 下段・左から3番目: カメムシ4体
const CIV_COL = 2, CIV_ROW = 3;         // 中央の1つ下: 制圧後に非武装3人
const SKILL_COL = 1, SKILL_ROW = 3;     // 下から2番目・左から2番目: Long Push取得地
const isNest = (c, r) => c === NEST_COL && r === NEST_ROW;
const isFort = (c, r) => c === FORT_COL && r === FORT_ROW;
const isReinf = (c, r) => (c === REINF_COL && r === REINF_ROW) ||
  (c === REINF2_COL && r === REINF2_ROW) || (c === REINF3_COL && r === REINF3_ROW);
const isBugField = (c, r) => c === BUG_FIELD_COL && r === BUG_FIELD_ROW;
const isCivilianStage = (c, r) => c === CIV_COL && r === CIV_ROW;
const isSkillStage = (c, r) => c === SKILL_COL && r === SKILL_ROW;
let stageCol = 0, stageRow = 0;
const skey = (c, r) => c + ',' + r;
const stageDist = (c, r) => c + r;   // 開始からのマンハッタン距離 = 難度
function mulberry32(a) {             // ステージ固定シード乱数(再訪しても同じ地形)
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// terrain uses a per-stage seed offset so each screen looks different
let terrainOff = 0;
function groundH(x, z) {
  const o = terrainOff;
  return 0.50 * Math.sin((x + o) * 0.28) * Math.cos(z * 0.24)
       + 0.20 * Math.sin((x + o) * 0.71 + 1.3) * Math.sin(z * 0.63 + 0.4)
       + 0.07 * Math.sin((x + o) * 1.9 + 4.1) * Math.cos(z * 1.7 + 2.0);
}

// ================= renderer / scene =================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.28;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf7f6f2);

// ---- fixed top-down orthographic camera (old-school single-screen) ----
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 300);
const ELEV = 76 * Math.PI / 180;           // 76° from horizontal ≈ ほぼ真上、わずかに傾け
const DEFAULT_ZOOM = 1.30;                 // ホイールをほんの少し引いた初期画角。全方向の枠外をクリック可能にする
let zoomScale = DEFAULT_ZOOM;
const camDir = new THREE.Vector3(0, Math.sin(ELEV), Math.cos(ELEV));   // +z側から: 画面右=+x
let camPanX = 0, camPanZ = 0;   // 敗北演出などで注視点をずらす
function frameCamera() {
  const aspect = innerWidth / innerHeight;
  const halfX = (STAGE_HALF_W + 2.5) * zoomScale;
  camera.left = -halfX; camera.right = halfX;
  camera.top = halfX / aspect; camera.bottom = -halfX / aspect;
  camera.position.copy(camDir).multiplyScalar(120);   // 距離は正射影では見た目に無関係
  camera.position.x += camPanX; camera.position.z += camPanZ;
  camera.lookAt(camPanX, 0, camPanZ);
  camera.updateProjectionMatrix();
}
frameCamera();

scene.add(new THREE.HemisphereLight(0xffffff, 0xd6d6cc, 1.06));   // fillを上げて影をほんの少し薄く
const sun = new THREE.DirectionalLight(0xfffbee, 1.42);
sun.position.set(14, 26, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -26; sun.shadow.camera.right = 26;
sun.shadow.camera.top = 18; sun.shadow.camera.bottom = -18;
sun.shadow.camera.far = 90;
sun.shadow.bias = -0.0004;
scene.add(sun, sun.target);

// ---- ground (rebuilt on stage change so terrain varies) ----
const groundGeo = new THREE.PlaneGeometry(STAGE_HALF_W * 2 + 8, STAGE_HALF_D * 2 + 8, 120, 80);
groundGeo.rotateX(-Math.PI / 2);
const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1 }));
ground.receiveShadow = true;
ground.name = 'ground';
scene.add(ground);
// stage border ring
const borderMat = new THREE.LineBasicMaterial({ color: 0xd9c7c7, transparent: true, opacity: 0.6 });
const bpts = [
  [-STAGE_HALF_W, -STAGE_HALF_D], [STAGE_HALF_W, -STAGE_HALF_D],
  [STAGE_HALF_W, STAGE_HALF_D], [-STAGE_HALF_W, STAGE_HALF_D], [-STAGE_HALF_W, -STAGE_HALF_D],
].map(([x, z]) => new THREE.Vector3(x, 0, z));
const border = new THREE.Line(new THREE.BufferGeometry().setFromPoints(bpts), borderMat);
scene.add(border);

// ---- 行き止まりの辺(グリッド外周)は濃い線で塞ぐ ----
const blockMat = new THREE.LineBasicMaterial({ color: 0x7a736a, transparent: true, opacity: 0.85 });
function sidePts(side) {
  const pts = [], N = 24;
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    if (side === 'L') pts.push(new THREE.Vector3(-STAGE_HALF_W, 0, -STAGE_HALF_D + t * STAGE_HALF_D * 2));
    if (side === 'R') pts.push(new THREE.Vector3(STAGE_HALF_W, 0, -STAGE_HALF_D + t * STAGE_HALF_D * 2));
    if (side === 'T') pts.push(new THREE.Vector3(-STAGE_HALF_W + t * STAGE_HALF_W * 2, 0, -STAGE_HALF_D));
    if (side === 'B') pts.push(new THREE.Vector3(-STAGE_HALF_W + t * STAGE_HALF_W * 2, 0, STAGE_HALF_D));
  }
  return pts;
}
const sideLines = {};
for (const s of ['L', 'R', 'T', 'B']) {
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(sidePts(s)), blockMat);
  line.visible = false;
  scene.add(line);
  sideLines[s] = { line, pts: sidePts(s) };
}
function updateBlockedSides() {   // 画面上(T)=row-1、画面下(B)=row+1
  sideLines.L.line.visible = stageCol === 0;
  sideLines.R.line.visible = stageCol === GRID - 1;
  sideLines.T.line.visible = stageRow === 0;
  sideLines.B.line.visible = stageRow === GRID - 1;
}

// ---- 岩・要塞壁(遮蔽物): 弾を防ぎ、移動は押し出しで迂回させる ----
const hqGapAngles = [];   // 本拠地の開口部角度(守備隊の配置に使う)
const rocks = [];   // {x, z, r}
const rockGroup = new THREE.Group();
scene.add(rockGroup);
const rockMat = new THREE.MeshStandardMaterial({ color: 0xd9d3c3, roughness: 0.95 });
const doorMat = new THREE.MeshStandardMaterial({ color: 0x50493e, roughness: 0.9, side: THREE.DoubleSide });
let accessPoint = null, apLight = null;   // 敵本拠地の最終目標(制圧後に接続するとエンディング)
function addRock(x, z, r, h, rng, door = false) {
  const geo = new THREE.CylinderGeometry(r * (0.8 + rng() * 0.25), r, h, 7);
  const m = new THREE.Mesh(geo, rockMat);
  m.position.set(x, groundH(x, z) + h / 2 - 0.06, z);
  m.rotation.y = rng() * Math.PI * 2;
  m.castShadow = m.receiveShadow = true;
  rockGroup.add(m);
  if (door) {   // 障害物は「家」: ドアっぽい長方形を側面に貼る
    const dh = h * 0.62;
    const dm = new THREE.Mesh(new THREE.PlaneGeometry(r * 0.5, dh), doorMat);
    const a = rng() * Math.PI * 2;
    dm.position.set(x + Math.sin(a) * r * 0.92, groundH(x, z) + dh / 2 - 0.02, z + Math.cos(a) * r * 0.92);
    dm.rotation.y = a;
    rockGroup.add(dm);
  }
  rocks.push({ x, z, r, mesh: m });
}
function addAccessPoint(x, z) {
  const g = new THREE.Group();
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.3, 0.55),
    new THREE.MeshStandardMaterial({ color: 0x3c3a34, roughness: 0.6 }));
  base.position.y = 0.15;
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.05, 1.3, 6),
    new THREE.MeshStandardMaterial({ color: 0x55524a, roughness: 0.5 }));
  pole.position.y = 0.95;
  apLight = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8),
    new THREE.MeshStandardMaterial({ color: 0x224422, emissive: 0x33ee55, emissiveIntensity: 1.2 }));
  apLight.position.y = 1.66;
  base.castShadow = pole.castShadow = true;
  g.add(base, pole, apLight);
  g.position.set(x, groundH(x, z), z);
  rockGroup.add(g);
  accessPoint = { x, z };
}
let skillBeacon = null;
function addSkillSite() {
  // 成体CGを拡大・変色して横倒しにした巨大な死骸。足先だけ内側へ巻く。
  const g = new THREE.Group(), cx = 4.0, cz = -1.2;
  const corpseMat = addRim(new THREE.MeshStandardMaterial({
    color: 0x69cbd0, roughness: 0.48, transparent: true, opacity: 0.48
  }), 0.22);
  const body = adult.bodyMesh.clone(); body.material = corpseMat;
  body.position.set(0, 0.28, 0); body.rotation.z = 1.08; g.add(body);
  for (let i = 0; i < adult.legs.length; i++) {
    const src = adult.legs[i], a = src.ang, side = src.side;
    const reach = 1.55 + src.pair * 0.36 + (src.sensory ? 0.7 : 0);
    const S = new THREE.Vector3(Math.sin(a) * 0.16, 0.25, Math.cos(a) * 0.16);
    const K = new THREE.Vector3(Math.sin(a) * reach, 0.48 + (i % 2) * 0.11, Math.cos(a) * reach);
    const curlA = a - side * (0.58 + src.pair * 0.08);
    const F = new THREE.Vector3(Math.sin(curlA) * reach * 0.66, 0.12, Math.cos(curlA) * reach * 0.66);
    const fe = src.femur.clone(), ti = src.tibia.clone(), kn = src.knee.clone();
    fe.material = ti.material = kn.material = corpseMat;
    placeSeg(fe, S, K); placeSeg(ti, K, F); kn.position.copy(K); g.add(fe, ti, kn);
  }
  g.scale.setScalar(2.7); g.rotation.y = -0.22;
  g.position.set(cx, groundH(cx, cz) + 0.08, cz); rockGroup.add(g);

  // 死骸を岩で隙間なく囲い、左側の入口だけを細長い隘路として残す。
  const rng = mulberry32(731), wallN = 48;
  for (let i = 0; i < wallN; i++) {
    let a = i / wallN * Math.PI * 2;
    if (Math.abs(a - Math.PI * 1.5) < 0.18) continue;   // -x側（画面左）の入口
    const x = cx + Math.sin(a) * 11.6, z = cz + Math.cos(a) * 7.5;
    addRock(x, z, 0.88 + rng() * 0.18, 0.58 + rng() * 0.16, rng, true);
  }
  // 左端まで伸ばさず短くする。死骸側ほど少し開いて、円環の入口で引っ掛からない漏斗形にする。
  for (let x = -11.8; x <= cx - 11.0; x += 1.35) {
    const mouthT = THREE.MathUtils.clamp((x + 11.8) / 4.8, 0, 1);
    const laneHalf = 2.25 + mouthT * 0.45;
    addRock(x, cz - laneHalf, 0.92, 0.62, rng, true);
    addRock(x, cz + laneHalf, 0.92, 0.62, rng, true);
  }
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.62, 0.22, 18),
    new THREE.MeshBasicMaterial({ color: 0x86d8dc, transparent: true, opacity: 0.38 }));
  base.position.set(cx, groundH(cx, cz) + 0.12, cz);
  const light = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 9),
    new THREE.MeshStandardMaterial({ color: 0x4aafb5, emissive: 0x79f1f4, emissiveIntensity: 2.0 }));
  light.position.set(cx, groundH(cx, cz) + 0.45, cz);
  g.add(base, light); rockGroup.add(g);
  skillBeacon = { x: cx, z: cz, light };
}
function clearRocks() {
  rockGroup.clear();
  rocks.length = 0;
  accessPoint = null; apLight = null; skillBeacon = null;
}
const moundMat = new THREE.MeshStandardMaterial({ color: 0x9a7f57, roughness: 1 });
const houseMat = new THREE.MeshStandardMaterial({ color: 0xcfc7b4, roughness: 0.95 });
let nestNode = null, nestLight = null;   // 巣の子ども補充ノード(死骸を食べると出現)
let nestUnlocked = false;                // 一度死骸を食べたら以後ずっと巣が使える
let nestSpawnT = 0;                       // 補充タイマー(5秒間隔)
let fortEmitT = 5;                         // 砦の武装兵排出タイマー
function addMoundRing(cx, cz, R, n, rng) {
  // もよもよっとした盛り土のリング(装飾・当たり判定なし)
  for (let i = 0; i < n; i++) {
    const a = i / n * Math.PI * 2 + (rng() - 0.5) * 0.12;
    const rr = R + (rng() - 0.5) * 0.9;
    const x = cx + Math.sin(a) * rr, z = cz + Math.cos(a) * rr * 0.8;
    const s = 0.34 + rng() * 0.34, h = 0.16 + rng() * 0.16;
    const m = new THREE.Mesh(new THREE.SphereGeometry(s, 7, 5), moundMat);
    m.scale.y = h / s;
    m.position.set(x, groundH(x, z) + h * 0.2, z);
    m.castShadow = m.receiveShadow = true;
    rockGroup.add(m);
  }
}
function addNestNode(x, z) {
  const g = new THREE.Group();
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.22, 8, 16), moundMat);
  rim.rotation.x = Math.PI / 2; rim.position.y = 0.1;
  const hole = new THREE.Mesh(new THREE.CircleGeometry(0.42, 16),
    new THREE.MeshBasicMaterial({ color: 0x241d14 }));
  hole.rotation.x = -Math.PI / 2; hole.position.y = 0.06;
  nestLight = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8),
    new THREE.MeshStandardMaterial({ color: 0x224422, emissive: 0x55dd66, emissiveIntensity: 1.1 }));
  nestLight.position.y = 0.16;
  rim.castShadow = true;
  // スポナーの中心には、巣の目印として成体の死体を常設する(食事アイテムではない)。
  const guardianCorpse = makeCorpseMesh();

function pushOutOfRocks(pos, pad, vx = 0, vz = 0) {

      pos.x += dx * k; pos.z += dz * k;
      // 壁に正面から押し当てても固まらない: 進行方向に沿った接線へ一定量滑らせる
      // (壁沿いに流れて自然に開口部へ回り込める)
      let tx = dz / dd, tz = -dx / dd;
      if (tx * vx + tz * vz < 0) { tx = -tx; tz = -tz; }

      const t = Math.min(leg.stepT, 1);
      this.legHome(leg, _v2);
      _v2.addScaledVector(this.vel, leg.stepDur * 1.0);    // 着地予測(前方へ)
      _v2.y = groundH(_v2.x, _v2.z);
      // サイクロイド系: 離地・着地とも足先速度が0になり跳ねない
      const travel = t - Math.sin(Math.PI * 2 * t) / (Math.PI * 2);
      leg.foot.lerpVectors(leg.stepFrom, _v2, travel);
      leg.foot.y += (0.24 + 0.18 * speedNorm) * this.s * (1 - Math.cos(Math.PI * 2 * t)) * 0.5;
      if (leg.stepT >= 1) { leg.foot.copy(_v2); leg.stepping = false; }
    }
    if (this.swinging && !anySwing) {
      // 三脚の全脚が着地 = 支持交替イベント。胴体運動の基準にする
      this.swinging = false;
      this.supportGroup = this.nextSwing;
      this.nextSwing = 1 - this.nextSwing;
      if (this.lastLand >= 0)
        this.halfCycle = THREE.MathUtils.clamp(
          THREE.MathUtils.lerp(this.halfCycle, time - this.lastLand, 0.25), 0.12, 0.32);
      this.lastLand = time;
      this.contactAge = 0;
      this.sagT = 0;                     // 着地直後の沈み開始
    }
    this.contactAge += dt;

    // --- sensory legs (pair II): sweep & tap ahead like antennae ---
    const sinY = Math.sin(this.yaw), cosY = Math.cos(this.yaw);
    for (const leg of this.legs) {
      if (!leg.sensory) continue;
      const ph = time * this.senseRate + (leg.side > 0 ? 0 : Math.PI * 0.85) + leg.phase;
      const sweep = Math.sin(ph) * (0.45 + 0.18 * Math.sin(leg.phase));   // 左右に掃く(振幅も個体差)
      const reach = (leg.L1 + leg.L2) * 0.82;
      const outAng = this.yaw + leg.side * 0.42 + sweep;  // 前方外側〜内側を往復
      const fx = this.pos.x + Math.sin(outAng) * reach;
      const fz = this.pos.z + Math.cos(outAng) * reach;
      const tap = 0.5 + 0.5 * Math.sin(time * this.tapRate + leg.phase * 1.3 + (leg.side > 0 ? 0 : 1.7));
      const tapH = 0.02 + 0.85 * Math.pow(tap, 1.6);   // 低い位相ではほぼ床に触れる(本当にtapする)
      leg.foot.set(fx, groundH(fx, fz) + tapH * this.s, fz);
    }

    // --- body posture: 支持脚(stance)だけから支持面を作る。swing脚に胴体が釣られない ---
    let avgY = 0, frontY = 0, backY = 0, leftY = 0, rightY = 0;
    let n = 0, fn = 0, bn = 0, ln = 0, rn = 0;
    for (const leg of walk) {
      if (leg.stepping) continue;
      avgY += leg.foot.y; n++;
      if (leg.pair < 2) { frontY += leg.foot.y; fn++; } else { backY += leg.foot.y; bn++; }
      if (leg.side > 0) { rightY += leg.foot.y; rn++; } else { leftY += leg.foot.y; ln++; }
    }
    if (n >= 3 && fn && bn && ln && rn) {   // 支持面が作れる時だけ更新、不足時は直前を保持
      this.suppY = avgY / n;
      this.suppPitch = backY / bn - frontY / fn;
      this.suppRoll = leftY / ln - rightY / rn;
    }

    // --- 歩容連動の胴体運動(全て表示専用、this.posは不変) ---
    const gate = THREE.MathUtils.smoothstep(speedNorm, 0.05, 0.3);   // Idleでは消える
    const u = THREE.MathUtils.clamp(this.contactAge / (this.halfCycle * this.cycleJitter), 0, 1);
    const arch = 0.5 - 0.5 * Math.cos(Math.PI * 2 * u);   // 支持交替で低く、支持期中央で高く
    const downAmp = (0.030 + 0.050 * speedNorm) * this.s * gate;
    const upAmp   = (0.040 + 0.045 * speedNorm) * this.s * gate;
    let bodyVert = -downAmp + (downAmp + upAmp) * arch
                 + (1 - gate) * Math.sin(time * 1.7 + this.gaitSeed * 7) * 0.004 * this.s;  // Idleは微かな呼吸だけ
    if (this.sagT < 1) {   // 着地直後、細い脚に荷重が乗る沈み
      this.sagT = Math.min(this.sagT + dt / 0.13, 1);
      bodyVert -= 0.025 * this.s * (1 - this.sagT) * gate;
    }
    // 支持側後脚と反対方向への横揺れ(lurch)
    const lateral = (this.supportGroup === 0 ? 1 : -1)
                  * (0.030 + 0.055 * speedNorm) * this.s * gate * Math.sin(Math.PI * u);

    // 捕食プレス: 素早く沈み、捕食中は低いまま保持し、最後に立ち上がる(台形カーブ)
    let hMul = 1;
    if (this.prey) {
      const pt = Math.min(this.pounceT, 1);
      const edge = this.isAdult ? 0.22 : 0.10;   // 沈み/立ち上がりに使う割合
      hMul = 1 - 0.85 * THREE.MathUtils.clamp(Math.min(pt, 1 - pt) / edge, 0, 1);
    } else if (this.eatT < 1) {
      // アイテムを食べる: 大きく屈んで長めにじっとする
      const pt = this.eatT;
      hMul = 1 - 0.9 * THREE.MathUtils.clamp(Math.min(pt, 1 - pt) / 0.12, 0, 1);
    }
    // 被弾クラウチ(表示のみ)
    if (this.invulnT > 0) {
      const e = 0.9 - this.invulnT;
      const k = e < 0.08 ? e / 0.08 : Math.max(1 - (e - 0.08) / 0.28, 0);
      bodyVert -= 0.13 * this.s * k;
    }
    // 生成直後の起き上がり(子ども)
    if (this.unfoldT < 1) {
      this.unfoldT = Math.min(this.unfoldT + dt / 0.35, 1);
      hMul *= 0.55 + 0.45 * this.unfoldT;
    }

    const targetY = this.suppY + this.bodyH * hMul + bodyVert;
    this.bodyY += (targetY - this.bodyY) * (1 - Math.exp(-9 * dt));

    const rX = Math.cos(this.yaw), rZ = -Math.sin(this.yaw);   // 右方向(横揺れは表示オフセットのみ)
    this.group.position.set(this.pos.x + rX * lateral, this.bodyY, this.pos.z + rZ * lateral);
    this.group.rotation.order = 'YXZ';
    this.group.rotation.y = this.yaw;
    this.group.rotation.x = THREE.MathUtils.clamp(this.suppPitch * 0.10, -0.25, 0.25);
    this.group.rotation.z = THREE.MathUtils.clamp(this.suppRoll * 0.10, -0.25, 0.25);
    this.group.updateMatrixWorld();

    // --- IK + render ---
    // 大群時は子どもの脚IKを個体ごとに交互更新。止めずに位相をずらすので群れ全体では動き続けて見える。
    const crowdN = spiders.length;
    if (!this.isAdult && crowdN >= 70) {
      const div = crowdN >= 120 ? 3 : 2;
      if ((crowdRenderFrame + this.lodPhase) % div !== 0) return;
    }
    const bodyR = 0.15 * this.s;
    for (const leg of this.legs) {
      if (leg.lost) continue;   // 自切した脚は描画しない
      _v1.set(Math.sin(leg.ang) * bodyR, 0, Math.cos(leg.ang) * bodyR);
      this.group.localToWorld(_v1);
      const S = _v1, F = _v3.copy(leg.foot);
      _v2.subVectors(F, S);
      let d = _v2.length();
      const maxL = (leg.L1 + leg.L2) * 0.985;
      if (d > maxL) { F.copy(S).addScaledVector(_v2, maxL / d); _v2.subVectors(F, S); d = maxL; }
      _v2.divideScalar(d);
      const ox = F.x - this.pos.x, oz = F.z - this.pos.z;
      const ol = Math.max(Math.hypot(ox, oz), 1e-4);
      const upOut = new THREE.Vector3(ox / ol * 0.35, 1, oz / ol * 0.35).normalize();
      upOut.addScaledVector(_v2, -upOut.dot(_v2));
      if (upOut.lengthSq() < 1e-6) upOut.set(0, 1, 0);
      upOut.normalize();
      const a = (leg.L1 * leg.L1 - leg.L2 * leg.L2 + d * d) / (2 * d);
      const h = Math.sqrt(Math.max(leg.L1 * leg.L1 - a * a, 0));
      const K = new THREE.Vector3().copy(S).addScaledVector(_v2, a).addScaledVector(upOut, h);
      placeSeg(leg.femur, S, K);
      placeSeg(leg.tibia, K, F);
      leg.knee.position.copy(K);
    }
  }

  dispose() {
    scene.remove(this.group);
    for (const leg of this.legs) scene.remove(leg.femur, leg.tibia, leg.knee);
  }
}

// ================= unique children: 群れに各1体だけ =================
const uniqueState = {
  companion: { living: [], ever: false, slots: 0, readyAt: 0 },
  slacker:   { living: null, ever: false, readyAt: 0 },
  assassin:  { living: null, ever: false, readyAt: 0 },
  guardian:  { living: null, ever: false, readyAt: Infinity },
};
let guardianPeakReached = false, guardianReady = false; // 一度80体到達→8体以下で次の新生児が守護者
const companionCorpses = {};    // skey → 死体レコード(食べられるまで残る)
function colorUniqueChild(sp, type) {
  sp.uniqueKind = type;
  if (type === 'companion') { sp.kind = 'companion'; sp.hp = sp.maxHp = 3; sp.speed = 3.9; }
  else if (type === 'slacker') { sp.kind = 'slacker'; sp.hp = sp.maxHp = 5; sp.speed = 2.8; sp.retargetT = 0; }
  else if (type === 'assassin') {
    sp.kind = 'assassin'; sp.hp = sp.maxHp = 3; sp.speed = 3.8;
    sp.bodyMat.color.set(0x171817); sp.legMat.color.set(0x252725); sp.senseMat.color.set(0x343634);
  } else if (type === 'guardian') {
    sp.kind = 'guardian'; sp.hp = sp.maxHp = 8; sp.speed = 3.9;
    sp.bodyMat.color.set(0xf08aa9); sp.legMat.color.set(0xe68aa5); sp.senseMat.color.set(0xf2a3b9);
  }
  if (type === 'companion') uniqueState.companion.living.push(sp);
  else uniqueState[type].living = sp;
  uniqueState[type].ever = true;
  pulse(sp.pos.x, sp.pos.z, type === 'assassin' ? 0x222222 : type === 'guardian' ? 0xff8eb0 : 0x8fa065);
}
function maybeMakeUnique(sp) {   // 新しく増えた個体だけが候補
  const count = spiders.length - 1;
  if (!uniqueState.guardian.ever && guardianReady) {
    colorUniqueChild(sp, 'guardian'); guardianReady = false; return sp;
  }
  const co = uniqueState.companion;
  const unlockedCompanionSlots = count >= 60 ? 3 : count >= 40 ? 2 : count >= 20 ? 1 : 0;
  co.slots = Math.max(co.slots, unlockedCompanionSlots);
  if (co.living.length < co.slots && simTime >= co.readyAt) { colorUniqueChild(sp, 'companion'); return sp; }
  const sl = uniqueState.slacker;
  if (!sl.living && count >= 30 && simTime >= sl.readyAt && Math.random() < 0.20) { colorUniqueChild(sp, 'slacker'); return sp; }
  const as = uniqueState.assassin, assassinNeed = as.ever ? 30 : 40;
  if (!as.living && count >= assassinNeed && simTime >= as.readyAt && Math.random() < 0.20) { colorUniqueChild(sp, 'assassin'); return sp; }
  return sp;
}
function addChild(sp) { spiders.push(sp); return maybeMakeUnique(sp); }
function makeCompanionCorpse(sp) {   // 元の子どものジオメトリを転がし、脚を崩した死体
  const g = new THREE.Group();
  const body = sp.bodyMesh.clone(); body.position.set(0, 0.16, 0); body.rotation.z = 1.15; g.add(body);
  for (let i = 0; i < sp.legs.length; i++) {
    const src = sp.legs[i], a = i / sp.legs.length * Math.PI * 2;
    const fe = src.femur.clone(), ti = src.tibia.clone();
    const S = new THREE.Vector3(Math.sin(a) * 0.08, 0.13, Math.cos(a) * 0.08);
    const K = new THREE.Vector3(Math.sin(a) * 0.28, 0.12 + (i % 2) * 0.04, Math.cos(a) * 0.28);
    const F = new THREE.Vector3(Math.sin(a + 0.5) * 0.18, 0.04, Math.cos(a + 0.5) * 0.18);
    placeSeg(fe, S, K); placeSeg(ti, K, F); g.add(fe, ti);
  }
  g.position.set(sp.pos.x, groundH(sp.pos.x, sp.pos.z), sp.pos.z); g.rotation.y = sp.yaw; scene.add(g); return g;
}
function onChildDeath(sp) {
  if (!sp.uniqueKind) return;
  const st = uniqueState[sp.uniqueKind];
  if (sp.uniqueKind === 'companion') {
    const i = uniqueState.companion.living.indexOf(sp);
    if (i >= 0) uniqueState.companion.living.splice(i, 1);
    uniqueState.companion.readyAt = simTime;
  } else if (st && st.living === sp) {
    st.living = null;
    st.readyAt = simTime;   // assassin/slackerは死亡直後から次の新生児が抽選対象
  }
  if (sp.uniqueKind === 'companion') {
    const k = skey(stageCol, stageRow), rec = { x: sp.pos.x, z: sp.pos.z, mesh: makeCompanionCorpse(sp), eater: null, eatT: 0, fallT: 0 };
    (companionCorpses[k] = companionCorpses[k] || []).push(rec);
  }
}
function syncCompanionCorpses() {
  const here = skey(stageCol, stageRow);
  for (const k of Object.keys(companionCorpses)) for (const rec of companionCorpses[k]) if (rec.mesh) rec.mesh.visible = k === here;
}
function updateUniqueChildren(dt, time) {
  const childN = spiders.length - 1, k = skey(stageCol, stageRow);
  if (childN >= 80) guardianPeakReached = true;
  if (!uniqueState.guardian.ever && guardianPeakReached && childN <= 8) guardianReady = true;
  const list = companionCorpses[k] || [];
  for (let i = list.length - 1; i >= 0; i--) {
    const rec = list[i]; rec.fallT = Math.min(rec.fallT + dt / 0.7, 1);
    rec.mesh.rotation.x = rec.fallT * 0.55;
    if (!rec.eater && adult.hp < adult.maxHp && adult.eatT >= 1 && !adult.prey && Math.hypot(adult.pos.x - rec.x, adult.pos.z - rec.z) < 1.0) {
      rec.eater = adult; rec.eatT = 0; adult.eatT = 0;
    }
    if (!rec.eater) continue;
    rec.eatT += dt / 1.7; adult.eatT = rec.eatT; adult.target.copy(adult.pos);
    if (rec.eatT >= 0.58 && !rec.consumed) {
      rec.consumed = true; adult.hp = Math.min(adult.maxHp, adult.hp + 3); popText(adult.pos.x, adult.pos.z, '♡HEAL'); scene.remove(rec.mesh);
    }
    if (rec.eatT >= 1) list.splice(i, 1);
  }
}

// ================= humans =================
const humans = [];
const humanBodyGeo = new THREE.CylinderGeometry(0.05, 0.07, 0.26, 8);
const humanHeadGeo = new THREE.SphereGeometry(0.06, 10, 8);
const humanMat = new THREE.MeshStandardMaterial({ color: 0x33312e, roughness: 0.85 });
// 武器3種: 見た目(体色・銃の形)で強さがわかる段階強化
const WEAPONS = {
  pistol:  { name: 'pistol',  range: 13,  cd: [1.6, 1.8], speed: 11,  life: 2.2, pellets: 1, spread: 0,    gun: [0.03, 0.03, 0.16],
             mat: new THREE.MeshStandardMaterial({ color: 0x5a2b28, roughness: 0.7 }) },
  rifle:   { name: 'rifle',   range: 18,  cd: [2.3, 1.5], speed: 17,  life: 2.4, pellets: 1, spread: 0,    gun: [0.025, 0.025, 0.32],
             mat: new THREE.MeshStandardMaterial({ color: 0x3e4a58, roughness: 0.6 }) },
  shotgun: { name: 'shotgun', range: 7.5, cd: [2.6, 1.6], speed: 9.5, life: 0.8, pellets: 3, spread: 0.24, gun: [0.05, 0.05, 0.20],
             mat: new THREE.MeshStandardMaterial({ color: 0x8a5a30, roughness: 0.65 }) },
};
const gunMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
// ユニーク敵「隊長」: 赤くて大きい。執拗に成体だけを狙い、3点バーストで撃つ。
// 子どもが4匹以上いないと押さえ込めない(群れの数がボスを倒す鍵)
const CAPTAIN_WPN = { name: 'captain', range: 15, cd: [1.9, 1.0], speed: 14, life: 2.0, pellets: 1, spread: 0, gun: [0.05, 0.05, 0.36],
  mat: new THREE.MeshStandardMaterial({ color: 0xe32b1c, roughness: 0.45, emissive: 0x7a0f08, emissiveIntensity: 0.55 }) };
// 機動射撃班用: 6人で発射位相をずらし、常に誰かが撃っている制圧射撃ライフル
const RELAY_WPN = Object.assign({}, WEAPONS.rifle, { cd: [0.72, 0.30], range: 19 });

// 味方が射線上にいたら撃たない(前列・後列の位置関係に意味を持たせる)
function allyBlocks(h, tx, tz) {
  const dx = tx - h.pos.x, dz = tz - h.pos.z;
  const len = Math.hypot(dx, dz);
  if (len < 1e-4) return false;
  const nx = dx / len, nz = dz / len;
  for (const o of humans) {
    if (o === h || o.caught) continue;
    const ox = o.pos.x - h.pos.x, oz = o.pos.z - h.pos.z;
    const t = ox * nx + oz * nz;
    if (t <= 0.2 || t >= len) continue;
    const px = ox - nx * t, pz = oz - nz * t;
    if (px * px + pz * pz < 0.09) return true;
  }
  return false;
}

class Human {
  constructor(x, z, weapon, brave = false) {
    this.pos = new THREE.Vector3(x, 0, z);
    this.caught = false;   // 押さえ込まれ中(捕食プレスの対象)
    this.wanderT = 0;
    this.dir = Math.random() * Math.PI * 2;
    this.weapon = weapon || null;   // WEAPONS のエントリ or null(丸腰)
    this.brave = brave;             // 守備隊: 逃げずに撃ち続ける
    this.captain = weapon === CAPTAIN_WPN;
    // 索敵範囲: 後半エリアほど広く敵に気づく(d≤2は従来どおり5、以降+2ずつ)
    this.senseR = 5 + Math.max(0, curStageDiff - 2) * 2.0;
    this.cell = null; this.slotIdx = 0; this.slotSide = 0;   // 編成(braveのみ使用)
    this.burstLeft = 0; this.burstT = 0;                     // 隊長の連射
    this.stunT = 0;                                         // Long Pushの怯み(射撃・移動停止)
    this.fireCd = 1.5 + Math.random() * 2;
    this.group = new THREE.Group();
    const mat = this.weapon ? this.weapon.mat : humanMat;
    const body = new THREE.Mesh(humanBodyGeo, mat); body.position.y = 0.13;
    const head = new THREE.Mesh(humanHeadGeo, mat); head.position.y = 0.3;
    body.castShadow = head.castShadow = true;
    this.group.add(body, head);
    if (this.weapon) {
      const g = this.weapon.gun;
      const gun = new THREE.Mesh(new THREE.BoxGeometry(g[0], g[1], g[2]), gunMat);
      gun.position.set(0.06, 0.16, 0.06);
      this.group.add(gun);
      this.gun = gun;
    }
    if (this.captain) this.group.scale.setScalar(1.55);   // 隊長はデカくて赤い
    scene.add(this.group);
  }
  update(dt, time) {
    if (this.caught) {   // 押さえ込まれている: 横倒しになってもがく(捕食されたのが一目でわかる)
      const y = groundH(this.pos.x, this.pos.z);
      this.group.position.set(this.pos.x, y + 0.05, this.pos.z);
      this.group.rotation.x = -Math.PI * 0.46;
      this.group.rotation.z = Math.sin(time * 22) * 0.12;   // もがき
      return;
    }
    if (this.stunT > 0) {
      this.stunT -= dt;
      this.group.position.set(this.pos.x, groundH(this.pos.x, this.pos.z) + 0.04, this.pos.z);
      this.group.rotation.x = -0.28; this.group.rotation.z = Math.sin(time * 28) * 0.16;
      return;
    }
    this.group.rotation.x = 0; this.group.rotation.z = 0;   // 解放されたら起き上がる
    // --- ターゲット: 隊長は常に成体を狙う。他は最寄り ---
    let nearest = null, nd = 1e9;
    if (this.captain || this.adultHunter) { nearest = adult; nd = adult.pos.distanceTo(this.pos); }
    else for (const sp of spiders) {
      const d = sp.pos.distanceTo(this.pos);
      if (d < nd) { nd = d; nearest = sp; }
    }
    // 編成兵は担当区画で標的を分散(左スロットは左の敵、右は右)
    let shootTarget = nearest, sd = nd;
    if (this.cell && this.weapon && !this.captain) {
      const fx = Math.sin(this.cell.facing), fz = Math.cos(this.cell.facing);
      let best = null, bs = 1e9;
      for (const sp of spiders) {
        const d = sp.pos.distanceTo(this.pos);
        if (d > this.weapon.range) continue;
        const rx = sp.pos.x - this.cell.ax, rz = sp.pos.z - this.cell.az;
        const side = Math.sign(rx * fz - rz * fx);
        const score = d + (this.slotSide !== 0 && side !== 0 && side !== this.slotSide ? 3 : 0);
        if (score < bs) { bs = score; best = sp; }
      }
      if (best) { shootTarget = best; sd = best.pos.distanceTo(this.pos); }
    }
    let speed = 0.55;
    const scared = nearest && nd < this.senseR;
    // --- 射撃: 射程内なら撃つ(braveは怯えていなくても撃つ)。味方越しには撃たない ---
    if (this.weapon) {
      this.fireCd -= dt;
      if (this.burstLeft > 0) {   // 隊長の3点バースト
        this.burstT -= dt;
        if (this.burstT <= 0 && nearest) {
          this.burstT = 0.1; this.burstLeft--;
          spawnBullet(this.pos, nearest, this.weapon, (Math.random() - 0.5) * 0.06);
        }
      }
      if (this.fireCd <= 0 && shootTarget && sd < this.weapon.range && (scared || this.brave || this.captain)
          && !allyBlocks(this, shootTarget.pos.x, shootTarget.pos.z)) {
        this.fireCd = this.weapon.cd[0] + Math.random() * this.weapon.cd[1];
        for (let i = 0; i < this.weapon.pellets; i++) {
          const off = this.weapon.pellets > 1 ? (i - (this.weapon.pellets - 1) / 2) * this.weapon.spread : 0;
          spawnBullet(this.pos, shootTarget, this.weapon, off);
        }
        if (this.captain) { this.burstLeft = 2; this.burstT = 0.1; }
        this.group.lookAt(shootTarget.pos.x, this.pos.y, shootTarget.pos.z);
      }
    }
    // --- 移動 ---
    if (this.captain) {
      // 執拗に成体を追い、射程内では距離を保つ。後方支援型(rearGuard)は大きく距離を取る
      const near = this.rearGuard ? 9 : 4, far = this.rearGuard ? 13 : 8;
      if (nd > far) { this.dir = Math.atan2(adult.pos.x - this.pos.x, adult.pos.z - this.pos.z); speed = 1.05; }
      else if (nd < near) { this.dir = Math.atan2(this.pos.x - adult.pos.x, this.pos.z - adult.pos.z); speed = this.rearGuard ? 1.1 : 0.85; }
      else {
        this.wanderT -= dt;
        if (this.wanderT <= 0) { this.wanderT = 0.8 + Math.random(); this.dir += (Math.random() - 0.5) * 1.6; }
        speed = 0.4;
      }
    } else if (this.cell) {
      // 編成兵: セル(updateCells)が動かすスロットへ追従する。後退時も敵を向いたまま歩くのでひき打ちになる
      const s = this.cell.slots[this.slotIdx];
      const dsx = s.x - this.pos.x, dsz = s.z - this.pos.z;
      const dd = Math.hypot(dsx, dsz);
      if (dd > 0.25) { this.dir = Math.atan2(dsx, dsz); speed = dd > 1.1 ? 1.5 : 0.9; }
      else speed = 0;
      this.group.rotation.y = this.cell.facing;   // 常に陣形の正面(＝敵)を向く。後退中も向きは崩さない
    } else if (this.brave) {
      // 編成なし守備隊: 持ち場を守り、至近だけ少し離れる
      if (scared && nd < 2) {
        this.dir = Math.atan2(this.pos.x - nearest.pos.x, this.pos.z - nearest.pos.z);
        speed = 0.9;
      } else {
        this.wanderT -= dt;
        if (this.wanderT <= 0) { this.wanderT = 1 + Math.random() * 1.5; this.dir += (Math.random() - 0.5) * 2.0; }
        speed = 0.25;
      }
    } else if (scared) {
      // 武装人間は少し距離を取りつつ撃つ、丸腰は全力で逃げる
      const flee = Math.atan2(this.pos.x - nearest.pos.x, this.pos.z - nearest.pos.z);
      this.dir = flee + Math.sin(time * 3 + this.pos.x) * 0.4;
      speed = this.weapon ? (nd < 3 ? 1.6 : 0.5) : 1.7;
    } else {
      this.wanderT -= dt;
      if (this.wanderT <= 0) { this.wanderT = 1.5 + Math.random() * 2.5; this.dir += (Math.random() - 0.5) * 2.4; }
    }
    this.pos.x += Math.sin(this.dir) * speed * dt;
    this.pos.z += Math.cos(this.dir) * speed * dt;
    this.pos.x = THREE.MathUtils.clamp(this.pos.x, -STAGE_HALF_W + 0.4, STAGE_HALF_W - 0.4);
    clampStage(this.pos);
    pushOutOfRocks(this.pos, 0.12, Math.sin(this.dir), Math.cos(this.dir));
    const y = groundH(this.pos.x, this.pos.z);
    const panic = scared ? Math.abs(Math.sin(time * 20)) * 0.03 : 0;
    this.group.position.set(this.pos.x, y + panic, this.pos.z);
    if (!(this.weapon && (scared || this.brave))) this.group.rotation.y = this.dir;
  }
  dispose() { scene.remove(this.group); }
}

// ================= bullets =================
const bullets = [];
const bulletGeo = new THREE.CapsuleGeometry(0.02, 0.1, 3, 6);
const bulletMat = new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x442222, emissiveIntensity: 0.5 });
function spawnBullet(from, targetSpider, wpn = WEAPONS.pistol, angOff = 0) {
  const base = Math.atan2(targetSpider.pos.x - from.x, targetSpider.pos.z - from.z) + angOff;
  const dir = new THREE.Vector3(Math.sin(base), 0, Math.cos(base));
  const m = new THREE.Mesh(bulletGeo, bulletMat);
  m.userData.vel = dir.clone().multiplyScalar(wpn.speed);
  m.userData.life = wpn.life;
  m.position.set(from.x, groundH(from.x, from.z) + 0.25, from.z);
  m.quaternion.setFromUnitVectors(UP, dir);
  scene.add(m);
  bullets.push(m);
}
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.position.addScaledVector(b.userData.vel, dt);
    b.userData.life -= dt;
    let hit = false;
    // 岩が弾を防ぐ(遮蔽物の後ろは安全地帯)
    for (const rk of rocks) {
      if (Math.hypot(b.position.x - rk.x, b.position.z - rk.z) < rk.r) { hit = true; break; }
    }
    if (!hit) for (let j = spiders.length - 1; j >= 0; j--) {   // 成体HP6、子どもHP2
      const sp = spiders[j];
      if (Math.hypot(b.position.x - sp.pos.x, b.position.z - sp.pos.z) < (sp.isAdult ? 0.5 : 0.45)) {
        if (sp.invulnT <= 0) {
          sp.hp -= 1;
          if (sp.isAdult) {
            playSfx('adultHit', sp.hp <= 0 ? 2.0 : 1.0);
            sp.invulnT = 0.9;
            sp.vel.addScaledVector(_v1.copy(b.userData.vel).normalize(), 3.5);  // ノックバック
            pulse(sp.pos.x, sp.pos.z, 0xcc3333);
            if (sp.hp <= 0) gameOver();
          } else if (sp.hp <= 0) {
            playSfx('childCry');
            if (sp.prey) sp.prey.caught = false;   // 押さえ込み中に死んだら人間は逃げ出す
            pulse(sp.pos.x, sp.pos.z, 0xcc5544);
            onChildDeath(sp);
            sp.dispose(); spiders.splice(j, 1);
          } else {
            sp.invulnT = 0.3;                      // 1発目は耐える
            pulse(sp.pos.x, sp.pos.z, 0xdd9977);
          }
        }
        hit = true; break;
      }
    }
    if (hit || b.userData.life <= 0 ||
        Math.abs(b.position.x) > STAGE_HALF_W + 2 || Math.abs(b.position.z) > STAGE_HALF_D + 2) {
      scene.remove(b); bullets.splice(i, 1);
    }
  }
}

const SKILL_REACH = 7.2, SKILL_EFFECT_RADIUS = 1.75, SKILL_COOLDOWN = 8;
let skillUnlocked = false, skillCooldown = 0;
const skillUiEl = document.getElementById('skillui');
const skillHelpEl = document.getElementById('skillhelp');
const skillAim = { active: false, x: 0, z: 0, fill: null, rim: null, dot: null };
const skillCdGroup = new THREE.Group();
const skillCdMat = new THREE.ShaderMaterial({
  transparent: true, depthTest: false, side: THREE.DoubleSide,
  uniforms: { progress: { value: 1 } },
  vertexShader: 'varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader: 'varying vec2 vUv; uniform float progress; void main(){vec2 p=vUv-0.5; if(length(p)>0.5) discard; float a=atan(p.x,p.y)/6.2831853; if(a<0.0)a+=1.0; if(a>progress) discard; gl_FragColor=vec4(0.447,0.804,0.820,0.82);}'
});
const skillCdFill = new THREE.Mesh(new THREE.PlaneGeometry(1.16, 1.16), skillCdMat);
skillCdGroup.add(skillCdFill); skillCdGroup.visible = false; skillCdGroup.renderOrder = 9; scene.add(skillCdGroup);
function makeSkillAim() {
  const fill = new THREE.Mesh(new THREE.CircleGeometry(SKILL_EFFECT_RADIUS, 64),
    new THREE.MeshBasicMaterial({ color: 0x70d1d5, transparent: true, opacity: 0.11,
      blending: THREE.NormalBlending, depthTest: true, depthWrite: false, side: THREE.DoubleSide,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }));
  fill.rotation.x = -Math.PI / 2;
  const rimPts = [];
  for (let i = 0; i < 64; i += 2) {
    for (const j of [i, i + 1]) {
      const a = j / 64 * Math.PI * 2;
      rimPts.push(new THREE.Vector3(Math.sin(a) * SKILL_EFFECT_RADIUS, 0, Math.cos(a) * SKILL_EFFECT_RADIUS));
    }
  }
  const rim = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(rimPts),
    new THREE.LineBasicMaterial({ color: 0x567c6a, transparent: true, opacity: 0.38, depthTest: true, depthWrite: false }));
  const dot = new THREE.Mesh(new THREE.CircleGeometry(0.28, 20),
    new THREE.MeshBasicMaterial({ color: 0x58cbd0, transparent: true, opacity: 0.62, depthTest: true, depthWrite: false, side: THREE.DoubleSide }));
  dot.rotation.x = -Math.PI / 2;
  fill.visible = rim.visible = dot.visible = false;
  fill.renderOrder = 6; rim.renderOrder = 7; dot.renderOrder = 8;
  scene.add(fill, rim, dot); Object.assign(skillAim, { fill, rim, dot });
}
makeSkillAim();
function setSkillAimVisible(v) {
  skillAim.active = v;
  skillAim.fill.visible = skillAim.rim.visible = skillAim.dot.visible = v;
}
function updateSkillAim(x, z) {
  let dx = x - adult.pos.x, dz = z - adult.pos.z, d = Math.hypot(dx, dz);
  if (d > SKILL_REACH) { dx *= SKILL_REACH / d; dz *= SKILL_REACH / d; }
  skillAim.x = THREE.MathUtils.clamp(adult.pos.x + dx, -STAGE_HALF_W, STAGE_HALF_W);
  skillAim.z = THREE.MathUtils.clamp(adult.pos.z + dz, -STAGE_HALF_D, STAGE_HALF_D);
  // 円を1枚の平面として浮かせず、各頂点を地形の高さへ沿わせて紙面の質感を残す。
  const fp = skillAim.fill.geometry.attributes.position;
  for (let i = 0; i < fp.count; i++) {
    const lx = fp.getX(i), lz = -fp.getY(i);
    fp.setZ(i, groundH(skillAim.x + lx, skillAim.z + lz) + 0.035);
  }
  fp.needsUpdate = true;
  const rp = skillAim.rim.geometry.attributes.position;
  for (let i = 0; i < rp.count; i++) {
    const lx = rp.getX(i), lz = rp.getZ(i);
    rp.setY(i, groundH(skillAim.x + lx, skillAim.z + lz) + 0.045);
  }
  rp.needsUpdate = true;
  const y = groundH(skillAim.x, skillAim.z) + 0.055;
  skillAim.fill.position.set(skillAim.x, 0, skillAim.z);
  skillAim.rim.position.set(skillAim.x, 0, skillAim.z);
  skillAim.dot.position.set(skillAim.x, y, skillAim.z);
}

function castLongPush() {
  if (!skillAim.active || skillCooldown > 0) return;
  playSfx('skill');
  const x = skillAim.x, z = skillAim.z;
  for (const sp of spiders) {
    if (Math.hypot(sp.pos.x - x, sp.pos.z - z) <= SKILL_EFFECT_RADIUS && sp.hp < sp.maxHp) {
      const before = sp.hp;
      sp.hp = Math.min(sp.maxHp, sp.hp + 1); pulse(sp.pos.x, sp.pos.z, 0x62cbd0);
      if (!sp.isAdult && sp.hp > before)
        popText(sp.pos.x, sp.pos.z, '♥', { color: '#b8ff7d', scale: 1.05, height: 1.55 });
    }
  }
  for (const h of humans) {
    const dx = h.pos.x - x, dz = h.pos.z - z, d = Math.hypot(dx, dz);
    if (d > SKILL_EFFECT_RADIUS || h.caught) continue;
    h.stunT = Math.max(h.stunT, 1.0); h.burstLeft = 0; h.fireCd = Math.max(h.fireCd, 1.0);
    const k = 1.35 / Math.max(d, 0.5);
    h.pos.x += dx * k; h.pos.z += dz * k; clampStage(h.pos);
    pulse(h.pos.x, h.pos.z, 0x62cbd0);
  }
  spawnSkillMist(x, z);
  pulse(x, z, 0x4fbfc5); skillCooldown = SKILL_COOLDOWN;
}
function unlockSkill() {
  if (skillUnlocked) return;

  popText(adult.pos.x, adult.pos.z, 'Long Push', { color:'#61c6cc', scale:1.15 });
  skillHelpEl.classList.add('show');
  setTimeout(() => skillHelpEl.classList.remove('show'), 5000);
  updateMinimap();
}
function updateSkill(dt) {
  skillCooldown = Math.max(0, skillCooldown - dt);
  if (skillCooldown > 0) {
    const remain = skillCooldown / SKILL_COOLDOWN;
    skillCdGroup.visible = true;
    skillCdMat.uniforms.progress.value = remain;
    skillCdGroup.position.set(adult.pos.x, adult.bodyY + 0.7, adult.pos.z - 1.9);
    skillCdGroup.quaternion.copy(camera.quaternion);
  } else skillCdGroup.visible = false;
}

  spawnHumans(adult.pos.x, adult.pos.z);

  // --- adult target: クリック指示 > 至近距離(3.2)だけ自動追尾 > 待機 ---
  if (skillAim.active) {
    adult.target.copy(adult.pos);   // 範囲指定中は成体をその場に止める
  } else if (clickTarget) {
    adult.target.copy(clickTarget);
    if (adult.pos.distanceTo(clickTarget) < 0.4) clickTarget = null;
  } else {
    let nearest = null, nd = 1e9;
    for (const h of humans) {
      if (h.caught) continue;
      const d = h.pos.distanceTo(adult.pos); if (d < nd) { nd = d; nearest = h; }
    }
    if (nearest && nd < 3.2) adult.target.copy(nearest.pos);   // 触角の届く範囲だけ反応
    else adult.target.copy(adult.pos);                          // それ以外は待機(触角だけ動く)
  }
  // --- children target: nearby human or hover near parent ---
  for (const sp of spiders) {
    if (sp === adult) continue;
    sp.retargetT -= dt;
    if (sp.uniqueKind === 'companion') {   // 高速だが成体の護衛半径から離れない
      let nearEnemy = null, ndc = 1e9;
      for (const h of humans) {
        const da = h.pos.distanceTo(adult.pos), ds = h.pos.distanceTo(sp.pos);
        if (!h.caught && da < 4.2 && ds < ndc) { ndc = ds; nearEnemy = h; }
      }
      if (nearEnemy) sp.target.copy(nearEnemy.pos);
      else if (sp.pos.distanceTo(adult.pos) > 3.4) sp.target.copy(adult.pos);
      else if (sp.retargetT <= 0) {
        sp.retargetT = 1.2 + Math.random(); const a = Math.random() * 6.28, r = 1.8 + Math.random() * 1.1;
        sp.target.set(adult.pos.x + Math.sin(a) * r, 0, adult.pos.z + Math.cos(a) * r);
      }
      continue;
    }
    if (sp.uniqueKind === 'slacker') {   // 成体を完全に無視。たまに近場の仕事だけする
      if (sp.retargetT <= 0) {
        sp.retargetT = 1.8 + Math.random() * 2.5;
        let job = null, jd = 1e9;
        if (Math.random() < 0.25) for (const h of humans) { const d = h.pos.distanceTo(sp.pos); if (!h.caught && d < 6 && d < jd) { jd = d; job = h; } }
        if (job) sp.target.copy(job.pos);
        else sp.target.set((Math.random() * 2 - 1) * (STAGE_HALF_W - 1), 0, (Math.random() * 2 - 1) * (STAGE_HALF_D - 1));
      }
      continue;
    }
    if (sp.uniqueKind === 'assassin') {   // 成体から最も遠い敵をジグザグ追跡し、近い弾を横へ避ける
      let far = null, farD = -1;
      for (const h of humans) { const d = h.pos.distanceTo(adult.pos); if (!h.caught && d > farD) { farD = d; far = h; } }
      let dodge = null, bd = 1e9;
      for (const b of bullets) { const d = Math.hypot(b.position.x - sp.pos.x, b.position.z - sp.pos.z); if (d < bd) { bd = d; dodge = b; } }
      if (dodge && bd < 2.6) {
        const vx = dodge.userData.vel.x, vz = dodge.userData.vel.z, vl = Math.hypot(vx, vz) || 1;
        const side = Math.sin(time * 17 + sp.gaitSeed * 9) > 0 ? 1 : -1;
        sp.target.set(sp.pos.x - vz / vl * 2.2 * side, 0, sp.pos.z + vx / vl * 2.2 * side);
      } else if (far) {
        const dx = far.pos.x - sp.pos.x, dz = far.pos.z - sp.pos.z, dl = Math.hypot(dx, dz) || 1;
        const zig = Math.sin(time * 8 + sp.gaitSeed * 11) * 1.5;
        sp.target.set(far.pos.x - dz / dl * zig, 0, far.pos.z + dx / dl * zig);
      } else {
        // 暇な時は成体へ密着せず、少し離れた護衛位置から追跡する。
        const orbit = sp.gaitSeed * Math.PI * 2 + Math.sin(time * 0.35 + sp.gaitSeed * 5) * 0.28;
        const followR = 5.0;
        sp.target.set(adult.pos.x + Math.sin(orbit) * followR, 0, adult.pos.z + Math.cos(orbit) * followR);
      }
      continue;
    }
    // 成体に倒された赤いタカラダニの死体は、子どもが食べて赤子になる。
    // 1匹が食事を始めた死体には他の子が重ならない。
    let corpseTarget = sp.takaraCorpse || null;
    if (!corpseTarget) {
      let cd = 1e9;
      for (const rec of (takaraCorpses[skey(stageCol, stageRow)] || [])) {
        if (rec.gray || rec.eater) continue;
        const d = Math.hypot(rec.x - sp.pos.x, rec.z - sp.pos.z);
        if (d < 8 && d < cd) { cd = d; corpseTarget = rec; }
      }
    }
    if (corpseTarget) {
      const cd = Math.hypot(corpseTarget.x - sp.pos.x, corpseTarget.z - sp.pos.z);
      sp.target.set(corpseTarget.x, 0, corpseTarget.z);
      if (cd < 0.55 && !corpseTarget.eater && sp.eatT >= 1 && !sp.prey) {
        corpseTarget.eater = sp; corpseTarget.eatT = 0; sp.takaraCorpse = corpseTarget; sp.eatT = 0;
      }
      if (sp.takaraCorpse) {
        corpseTarget.eatT += dt / 1.7; sp.eatT = corpseTarget.eatT; sp.target.copy(sp.pos);
        if (corpseTarget.eatT >= 1) { sp.takaraCorpse = null; consumeTakaraCorpse(sp, corpseTarget); }
      }
      continue;
    }
    let nearest = null, nd = 1e9;
    for (const h of humans) { if (h.caught) continue; const d = h.pos.distanceTo(sp.pos); if (d < nd) { nd = d; nearest = h; } }
    // タカラダニが近ければそちらへ群がる(食べると赤子になる)
    let takaraTarget = null, tnd = 1e9;
    const childSense = sp.uniqueKind === 'guardian' ? 14 : 8;
    if (takaraHere()) { const d = Math.hypot(takara.x - sp.pos.x, takara.z - sp.pos.z); if (d < childSense && d <= nd) { tnd = d; takaraTarget = takara; } }
    if (takara2Here()) { const d = Math.hypot(takara2.x - sp.pos.x, takara2.z - sp.pos.z); if (d < childSense && d <= nd && d < tnd) { tnd = d; takaraTarget = takara2; } }
    if (takaraTarget) sp.target.set(takaraTarget.x, 0, takaraTarget.z);
    else if (nearest && nd < childSense) sp.target.copy(nearest.pos);
    else if (sp.retargetT <= 0) {
      sp.retargetT = 2 + Math.random() * 2;
      const a = Math.random() * Math.PI * 2, r = 1.2 + Math.random() * 2.6;
      sp.target.set(adult.pos.x + Math.sin(a) * r, 0, adult.pos.z + Math.cos(a) * r);
    }
  }
  // --- 捕食プレス進行: 押さえ込み中は減速し、胴体が接地した瞬間に取り込み ---
  for (const sp of spiders) {
    if (!sp.prey) continue;
    sp.pounceT += dt / sp.pounceDur;
    sp.target.copy(sp.pos);
    // 成体は押さえた勢いで即取り込み、子どもは捕食し終わる頃に新しい子どもが生まれる
    if (!sp.prey.eaten && sp.pounceT >= (sp.isAdult ? 0.5 : 0.85)) {
      const h = sp.prey; h.eaten = true;
      playSfx('human');
      addStain(h.pos.x, h.pos.z);   // 死亡跡: 黒いシミが最後まで残る
      addChild(spawnChildFrom(h));
      const idx = humans.indexOf(h);
      if (idx >= 0) humans.splice(idx, 1);
      h.dispose();
      const kk = skey(stageCol, stageRow);
      // カウント外(砦の湧き兵)は残数・制圧に影響しない
      if (!h.uncounted) {
        stageRemain[kk] = Math.max((stageRemain[kk] || 1) - 1, 0);
        if (h.captain) (stageFlags[kk] = stageFlags[kk] || {}).captainDead = true;
        const flg = (stageFlags[kk] = stageFlags[kk] || {});
        if (stageRemain[kk] === 0 && !flg.cleared) {   // 守備隊を全滅=制圧(湧き兵が残っていても成立)
          flg.cleared = true;
          showClearText();   // 地面に「clear」がスライドイン
          if (stageCol === HQ_COL && stageRow === HQ_ROW) {
            if (accessPoint) popText(accessPoint.x, accessPoint.z, '▶ CONNECT');   // アクセスポイントへ誘導
          } else {
            adult.hp = Math.min(adult.maxHp, adult.hp + 2);   // 制圧報酬: HP回復
            popText(adult.pos.x, adult.pos.z, '♡HEAL');
          }
          updateMinimap();
        }
      }
    }
    if (sp.pounceT >= 1) sp.prey = null;
  }

  for (const sp of spiders) sp.update(dt, time);

  // --- separation: 空間グリッドで近所だけ反発。100匹超でも全組合せを調べない ---
  {
    const cellSize = 1.55, buckets = new Map();
    for (let i = 0; i < spiders.length; i++) {
      const sp = spiders[i], gx = Math.floor(sp.pos.x / cellSize), gz = Math.floor(sp.pos.z / cellSize);
      const key = gx + ',' + gz;
      let arr = buckets.get(key); if (!arr) buckets.set(key, arr = []);
      arr.push(i);
    }
    for (let i = 0; i < spiders.length; i++) {
      const a = spiders[i], gx = Math.floor(a.pos.x / cellSize), gz = Math.floor(a.pos.z / cellSize);
      for (let ox = -1; ox <= 1; ox++) for (let oz = -1; oz <= 1; oz++) {
        const arr = buckets.get((gx + ox) + ',' + (gz + oz)); if (!arr) continue;
        for (const j of arr) {
          if (j <= i) continue;
          const b = spiders[j], dx = b.pos.x - a.pos.x, dz = b.pos.z - a.pos.z;
          const minD = 0.62 * (a.s + b.s) + 0.12, d2 = dx * dx + dz * dz;
          if (d2 > minD * minD || d2 < 1e-6) continue;
          const d = Math.sqrt(d2), push = (minD - d) / d * 0.5;
          if (a.isAdult) { b.pos.x += dx * push * 2; b.pos.z += dz * push * 2; }
          else if (b.isAdult) { a.pos.x -= dx * push * 2; a.pos.z -= dz * push * 2; }
          else {
            a.pos.x -= dx * push; a.pos.z -= dz * push;
            b.pos.x += dx * push; b.pos.z += dz * push;
          }
        }
      }
    }
    // ここではclampしない。ステージ遷移中の見切れ移動を各個体のupdateに任せる。
  }

  updateCells(dt);   // 編成セルのひき打ち(スロットを動かす)→ 各兵はそのスロットへ追従
  for (const h of humans) h.update(dt, time);
  // --- 人間同士の最低間隔(重なり防止、陣形が団子にならない) ---
  for (let i = 0; i < humans.length; i++) {
    const a = humans[i]; if (a.caught) continue;
    for (let j = i + 1; j < humans.length; j++) {
      const b = humans[j]; if (b.caught) continue;
      const min = (a.captain || b.captain) ? 1.7 : 1.25;
      const dx = b.pos.x - a.pos.x, dz = b.pos.z - a.pos.z;
      const d2 = dx * dx + dz * dz;
      if (d2 > min * min || d2 < 1e-6) continue;
      const dd = Math.sqrt(d2), push = (min - dd) / dd * 0.4;
      a.pos.x -= dx * push; a.pos.z -= dz * push;
      b.pos.x += dx * push; b.pos.z += dz * push;
    }
  }
  updateBullets(dt);

  // --- capture: 触れたら押さえ込み(pounce)開始。取り込みは上の進行ループで ---
  for (const h of humans) {
    if (h.caught) continue;
    // 隊長は子ども4匹以上の群れがいないと押さえ込めない
    if (h.captain && spiders.length - 1 < 4) {
      if (adult.pos.distanceTo(h.pos) < 1.2 && time > gatePulseT) {
        gatePulseT = time + 0.8;
        pulse(h.pos.x, h.pos.z, 0x999999);   // 灰色パルス=まだ無理
      }
      continue;
    }
    for (const sp of spiders) {
      if (sp.prey || sp.eatT < 1) continue;   // 1匹ずつ。食事中も襲えない
      const capR = 0.45 * sp.s + 0.28;
      if (h.pos.distanceTo(sp.pos) < capR) { h.caught = true; sp.prey = h; sp.pounceT = 0; break; }
    }
  }
  // --- items: 死骸を食べる(大きく屈んで長めにじっとする食事モーション付き) ---
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (!it.eater) {
      if (it.type === 'corpse') {   // 仲間の死骸は成体だけ
        if (adult.eatT >= 1 && !adult.prey && Math.hypot(adult.pos.x - it.x, adult.pos.z - it.z) < 1.0) {
          it.eater = adult; adult.eatT = 0;
        }
      } else {
        for (const sp of spiders) {
          if (sp.eatT < 1 || sp.prey) continue;
          if (Math.hypot(sp.pos.x - it.x, sp.pos.z - it.z) < 0.9) { it.eater = sp; sp.eatT = 0; break; }
        }
      }
      continue;
    }
    const eater = it.eater;
    if (eater !== adult && !spiders.includes(eater)) {   // 食事中に撃たれた
      if (it.consumed) items.splice(i, 1); else it.eater = null;
      continue;
    }
    eater.eatT = Math.min(eater.eatT + dt / 1.7, 1);
    eater.target.copy(eater.pos);   // 食事中は動かない
    if (!it.consumed && eater.eatT >= 0.55) {
      it.consumed = true;
      playSfx('item');
      if (it.type === 'corpse') {
        if (adult.maxHp < 8) {
          adult.maxHp += 1; adult.hp = Math.min(adult.hp + 1, adult.maxHp);
          popText(adult.pos.x, adult.pos.z, '♡+1');
        } else {   // 上限一杯でも「回復」として食べられる
          adult.hp = Math.min(adult.hp + 2, adult.maxHp);
          popText(adult.pos.x, adult.pos.z, '♡HEAL');
        }
      } else {
        for (let n2 = 0; n2 < 5; n2++)
          addChild(new Harvestman(it.x + (Math.random() - 0.5), it.z + (Math.random() - 0.5), 0.36, 0xa9ba7d));
        popText(eater.pos.x, eater.pos.z, '●+5');
      }
      itemTaken[it.key] = true;
      scene.remove(it.mesh);
    }
    if (eater.eatT >= 1) items.splice(i, 1);
  }
  updateTakara(dt, time); updateTakara2(dt, time);   // 右下4マス侵入後は2体が独立徘徊
  updateUniqueChildren(dt, time);

  // --- 巣: アクセス中は5秒間隔で子どもを最大5体まで補充(子ども全滅時の詰み回避) ---
  if (nestNode) {
    if (nestLight) nestLight.material.emissiveIntensity = 0.9 + 0.4 * Math.sin(time * 4);
    const aliveNest = spiders.filter(s => s.fromNest).length;
    const near = Math.hypot(adult.pos.x - nestNode.x, adult.pos.z - nestNode.z) < 2.8;
    if (near && aliveNest < 5) {
      nestSpawnT -= dt;
      if (nestSpawnT <= 0) {
        nestSpawnT = 5;
        const k = new Harvestman(nestNode.x + (Math.random() - 0.5) * 1.4, nestNode.z + (Math.random() - 0.5) * 1.4, 0.36, 0xa9ba7d);
        k.fromNest = true;
        addChild(k);
        pulse(nestNode.x, nestNode.z, 0x55dd66);
        // 画面上で巣の少し上に、HP表示と同程度の濃さで出す
        popText(nestNode.x, nestNode.z - 1.45, '●+1', { color: '#405020', opacity: 1, scale: 1.08, height: 1.9 });
      }
    } else if (!near) {
      nestSpawnT = 0;   // 離れたら次のアクセスで即1匹目
    }
  }
  // --- 増援拠点: 緑の家に成体が触れると子ども30匹が湧く(各拠点1回限り) ---
  if (reinfHouse) {
    const rk = skey(stageCol, stageRow);
    const done = (stageFlags[rk] || {}).reinfDone;
    if (reinfHouse.lamp)   // 未使用なら点滅、使用済みは消灯
      reinfHouse.lamp.material.emissiveIntensity = done ? 0 : 0.9 + 0.5 * Math.sin(time * 4);
    if (!done && Math.hypot(adult.pos.x - reinfHouse.x, adult.pos.z - reinfHouse.z) < 2.6) {
      (stageFlags[rk] = stageFlags[rk] || {}).reinfDone = true;
      for (let i = 0; i < 30; i++) {
        const a = Math.random() * Math.PI * 2, r = 1.0 + Math.random() * 3.0;
        addChild(new Harvestman(reinfHouse.x + Math.sin(a) * r, reinfHouse.z + Math.cos(a) * r, 0.36, 0xa9ba7d));
      }
      pulse(reinfHouse.x, reinfHouse.z, 0x6ef06e);
      popText(reinfHouse.x, reinfHouse.z, '●+30', { color: '#405020', scale: 1.08 });
    }
  }
  // --- 砦: 大きな家がclear後も弱い武装兵(pistol)を約5秒おきに排出。多すぎない範囲で ---
  if (isFort(stageCol, stageRow) && fortHouse) {
    fortEmitT -= dt;
    if (fortEmitT <= 0) {
      fortEmitT = 5;
      if (humans.length < 12) {
        const h = new Human(fortHouse.x + (Math.random() - 0.5) * 2,
          THREE.MathUtils.clamp(fortHouse.z + 2 + Math.random() * 1.5, -STAGE_HALF_D + 1, STAGE_HALF_D - 1),
          WEAPONS.pistol, false);
        h.uncounted = true; humans.push(h);
        pulse(h.pos.x, h.pos.z, 0xc9a0a0);
      }
    }
  }
  // 人間の再POPはしない: 狩り尽くしたステージは空になる(stageRemainで管理。砦だけ例外で上記排出)

  // --- ending trigger: 制圧済み本拠地のアクセスポイントに成体が触れる ---
  if (!ending && accessPoint && stageCol === HQ_COL && stageRow === HQ_ROW &&
      stageRemain[skey(HQ_COL, HQ_ROW)] === 0 &&
      Math.hypot(adult.pos.x - accessPoint.x, adult.pos.z - accessPoint.z) < 1.4) {
    startEnding();
  }

  // --- stage transition: クリック意図がある時だけ端で遷移(追跡中の誤遷移防止) ---
  if (stageIntent) {
    // 成体が枠から見切れてから遷移(体が紙の外へ歩き出してから画面が切り替わる)
    if (stageIntent.dx > 0 && adult.pos.x > STAGE_HALF_W + 1.4) goToStage(1, 0);
    else if (stageIntent.dx < 0 && adult.pos.x < -STAGE_HALF_W - 1.4) goToStage(-1, 0);
    else if (stageIntent.dz > 0 && adult.pos.z > STAGE_HALF_D + 1.4) goToStage(0, 1);
    else if (stageIntent.dz < 0 && adult.pos.z < -STAGE_HALF_D - 1.4) goToStage(0, -1);
    // クリック消化後に端から離れたら残留意図を破棄(誤遷移しない)
    else if (!clickTarget &&
             Math.abs(adult.pos.x) < STAGE_HALF_W - 4 &&
             Math.abs(adult.pos.z) < STAGE_HALF_D - 3) stageIntent = null;
  }

  // --- edge arrows: 行ける方向だけ矢印を表示、意図がある/端に近いと強調 ---
  edgeEls.L.classList.toggle('off', stageCol === 0);
  edgeEls.R.classList.toggle('off', stageCol === GRID - 1);
  edgeEls.T.classList.toggle('off', stageRow === 0);
  edgeEls.B.classList.toggle('off', stageRow === GRID - 1);
  edgeEls.L.classList.toggle('hot', !!(stageIntent && stageIntent.dx < 0) || adult.pos.x < -STAGE_HALF_W + 4);
  edgeEls.R.classList.toggle('hot', !!(stageIntent && stageIntent.dx > 0) || adult.pos.x > STAGE_HALF_W - 4);
  edgeEls.T.classList.toggle('hot', !!(stageIntent && stageIntent.dz < 0) || adult.pos.z < -STAGE_HALF_D + 3);
  edgeEls.B.classList.toggle('hot', !!(stageIntent && stageIntent.dz > 0) || adult.pos.z > STAGE_HALF_D - 3);

  // --- fx ---
  for (let i = pops.length - 1; i >= 0; i--) {   // 頭上ポップ: ふわっと上がって消える
    const m = pops[i];
    m.userData.t += dt;
    m.position.y += dt * 0.55;
    m.material.opacity = 0.9 * Math.max(0, 1 - m.userData.t / 1.6);
    if (m.userData.t >= 1.6) { scene.remove(m); m.material.map.dispose(); m.material.dispose(); pops.splice(i, 1); }
  }
  if (clearFx) {   // 「clear」左からイン(0.6s)→中央3秒→右へアウト(0.6s)
    clearFx.t += dt;
    const t = clearFx.t, m = clearFx.m;
    if (t < 0.6) { const e = 1 - Math.pow(1 - t / 0.6, 3); m.position.x = -46 + 46 * e; m.material.opacity = 0.42 * (t / 0.6); }
    else if (t < 3.6) { m.position.x = 0; m.material.opacity = 0.42; }
    else if (t < 4.2) { const e = Math.pow((t - 3.6) / 0.6, 2); m.position.x = 46 * e; m.material.opacity = 0.42 * (1 - (t - 3.6) / 0.6); }
    else { scene.remove(m); m.material.map.dispose(); m.material.dispose(); clearFx = null; }
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    const m = rings[i];
    m.userData.t += dt * 2.2;
    m.scale.setScalar(1 + m.userData.t * 2.5);
    m.material.opacity = 0.8 * (1 - m.userData.t);
    if (m.userData.t >= 1) { scene.remove(m); m.material.dispose(); rings.splice(i, 1); }
  }
  for (let i = skillMists.length - 1; i >= 0; i--) {
    const m = skillMists[i];
    m.userData.t += dt;
    m.position.x += m.userData.vx * dt; m.position.z += m.userData.vz * dt;
    m.position.y += dt * 0.22;
    const life = Math.min(m.userData.t / 0.85, 1);
    m.material.opacity = 0.3 * Math.sin(life * Math.PI);
    m.scale.multiplyScalar(1 + dt * 0.32);
    if (life >= 1) { scene.remove(m); m.material.dispose(); skillMists.splice(i, 1); }
  }

  statsEl.textContent =
    `${'♥'.repeat(Math.max(adult.hp, 0))}${'♡'.repeat(Math.max(adult.maxHp - adult.hp, 0))}  ●×${spiders.length - 1}`;
  renderer.render(scene, camera);
}
tick();

// ================= headless debug hooks =================
window.__step = (n = 1, dt = 1 / 60) => { for (let i = 0; i < n; i++) step(dt); return simTime.toFixed(2); };
window.__shot = () => {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/jpeg', 0.85);
  return fetch('/shot', { method: 'POST', body: url }).then(r => 'posted ' + url.length);
};
window.__click = (x, z) => { if (titleState.active) startGame(); setClickTarget(x, z); return 'ok'; };
window.__start = () => { startGame(); return 'ok'; };
window.__stage = (d) => {   // 'R'/'L'/'U'/'D' または +1/-1(左右)
  if (titleState.active) startGame();
  if (d === 'R' || d === 1) goToStage(1, 0);
  else if (d === 'L' || d === -1) goToStage(-1, 0);
  else if (d === 'U') goToStage(0, -1);
  else if (d === 'D') goToStage(0, 1);
  return skey(stageCol, stageRow);
};
window.__zoom = (v) => { zoomScale = v; frameCamera(); return zoomScale; };
window.__damage = (n = 1) => { adult.hp -= n; if (adult.hp <= 0) gameOver(); return adult.hp; };
window.__item = (type = 'bug') => {   // アート確認用: アイテムメッシュを原点に置く
  const m = type === 'bug' ? makeBugMesh() : makeCorpseMesh();
  m.position.set(0, groundH(0, 0), 0);
  scene.add(m);
  return 'ok';
};
window.__kids = (n = 4) => {   // バランステスト用: 子どもをn匹スポーン
  for (let i = 0; i < n; i++)
    addChild(new Harvestman(adult.pos.x + (Math.random() - 0.5) * 3, adult.pos.z + (Math.random() - 0.5) * 3, 0.36, 0xa9ba7d));
  return spiders.length - 1;
};
window.__cells = () => activeCells.map(c => ({
  ax: +c.ax.toFixed(2), az: +c.az.toFixed(2), facing: +c.facing.toFixed(2), mode: c.mode,
  homeAx: +c.homeAx.toFixed(2), homeAz: +c.homeAz.toFixed(2) }));
window.__spawnAt = (x, z, n = 6) => {   // 指定座標に子どもを湧かせる(陣形テスト用)
  for (let i = 0; i < n; i++)
    addChild(new Harvestman(x + (Math.random() - 0.5) * 2, z + (Math.random() - 0.5) * 2, 0.36, 0xa9ba7d));
  return spiders.length - 1;
};
window.__state = () => ({
  col: stageCol, row: stageRow, hp: adult.hp, maxHp: adult.maxHp, gameOver: isGameOver, gameClear: isGameClear,
  critical: +criticalMix.toFixed(2),
  adult: { x: +adult.pos.x.toFixed(2), z: +adult.pos.z.toFixed(2) },
  children: spiders.slice(1).map(s => ({ x: +s.pos.x.toFixed(2), z: +s.pos.z.toFixed(2), hp: s.hp, kind: s.kind, unique: s.uniqueKind || null })),
  unique: Object.fromEntries(Object.entries(uniqueState).map(([k, v]) => [k, {
    alive: Array.isArray(v.living) ? v.living.length > 0 : !!v.living,
    count: Array.isArray(v.living) ? v.living.length : (v.living ? 1 : 0),
    slots: v.slots || undefined, ever: v.ever, readyIn: Math.max(0, +(v.readyAt - simTime).toFixed(1))
  }])),
  companionCorpses: companionCorpses.length,
  humans: humans.map(h => ({ x: +h.pos.x.toFixed(2), z: +h.pos.z.toFixed(2),
    weapon: h.weapon ? h.weapon.name : null, brave: h.brave, cell: !!h.cell, tactical: h.tactical || null, caught: h.caught })),
  items: items.map(it => ({ type: it.type, x: +it.x.toFixed(1), z: +it.z.toFixed(1) })),
  bullets: bullets.length,
  rocks: rocks.length,
  remain: stageRemain[skey(stageCol, stageRow)],
  pounce: spiders.filter(s => s.prey).length,
  bodyY: +adult.bodyY.toFixed(3),
  title: titleState.active,
  titleKids: titleState.kids.length,
  ending: ending ? ending.phase : null,
  ap: !!accessPoint,
  stains: stainMeshes.length,
  lostLegs: adult.legs.filter(l => l.lost).length,
  legDebris: legDebrisMeshes.length,
  cells: activeCells.length,
  nestKids: spiders.filter(s => s.fromNest).length,
  reinf: reinfHouse ? { x: +reinfHouse.x.toFixed(1), z: +reinfHouse.z.toFixed(1),
    done: !!(stageFlags[skey(stageCol, stageRow)] || {}).reinfDone } : null,
  takara: { alive: takara.alive, col: takara.col, row: takara.row, x: +takara.x.toFixed(1), z: +takara.z.toFixed(1),
    eaten: takara.eaten, state: takara.state, respawnT: +takara.respawnT.toFixed(0), here: takaraHere(),
    unlocked2: secondTakaraUnlocked, total: secondTakaraUnlocked ? 2 : 1,
    second: takara2 ? { alive: takara2.alive, col: takara2.col, row: takara2.row, x: +takara2.x.toFixed(1), z: +takara2.z.toFixed(1), here: takara2Here() } : null,
    corpsesHere: (takaraCorpses[skey(stageCol, stageRow)] || []).length },
  skill: { unlocked: skillUnlocked, cooldown: +skillCooldown.toFixed(2), aiming: skillAim.active,
    pointerDown: pointerState.down, mists: skillMists.length,
    site: isSkillStage(stageCol, stageRow), beacon: !!skillBeacon },
});
window.__skillUnlock = () => { unlockSkill(); return __state().skill; };
window.__skillCast = (x = adult.pos.x, z = adult.pos.z) => {
  if (!skillUnlocked) unlockSkill();
  skillCooldown = 0; updateSkillAim(x, z); setSkillAimVisible(true); castLongPush(); setSkillAimVisible(false);
  return __state().skill;
};
window.__takara = () => __state().takara;
window.__takaraHere = () => {   // テスト用: 生きた個体を今のエリアの中央付近に呼ぶ(死んでいれば復活)
  if (!takara.alive) spawnTakaraRandom();
  takara.col = stageCol; takara.row = stageRow;
  takara.x = (Math.random() * 2 - 1) * 4; takara.z = (Math.random() * 2 - 1) * 3;
  takara.migrateT = 8 + Math.random() * 10; syncTakaraStage();
  return __state().takara;
};
window.__takaraKids = (n = 6) => {   // テスト用: タカラダニの周りに子どもを湧かせて群がらせる
  if (!takaraHere()) return 'Takara mite is not in this area';
  for (let i = 0; i < n; i++)
    addChild(new Harvestman(takara.x + (Math.random() - 0.5) * 2, takara.z + (Math.random() - 0.5) * 2, 0.36, 0xa9ba7d));
  return spiders.length - 1;
};
</script>
</body>
